limits:
  default: 3
  permission-based: true

item:
  id: haohansmp:soul_anchor
  material: GRINDSTONE
  placed-block: BARRIER
  custom-model-data: 910001
  display-name: "&b&lSoul Anchor"
  lore:
    - "&7A relic that binds a soul path to the world."
    - "&7Place it to create a teleport anchor."
    - ""
    - "&fID: &7haohansmp:soul_anchor"
    - "&fLimit: &b3 Soul Anchors"
    - "&fCost: &a10 levels / 1000 blocks"
    - "&fPlus: &b1 Echo Shard"

recipe:
  enabled: true
  discover-automatically: true

distance:
  blocks-per-tier: 1000
  levels-per-tier: 10
  minimum-level-cost: 10

teleport:
  echo-shard-cost: 1
  warmup-seconds: 3
  cooldown-seconds: 30
  movement-tolerance: 0.5

cross-dimension:
  enabled: true
  level-cost: 30
  echo-shard-cost: 1

safe-location:
  horizontal-radius: 3
  vertical-radius: 4

worlds:
  mode: blacklist
  list:
    - world_event
    - world_resource

breaking:
  drop-item: true

visuals:
  idle-particles: true
  idle-particle-interval-ticks: 20
  particle-view-distance: 24
