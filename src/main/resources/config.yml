limits:
  default: 3
  permission-based: true

item:
  id: haohansmp:soul_anchor
  # Vật phẩm nền chỉ dùng để bắt sự kiện đặt; model được trỏ trực tiếp bằng item-model.
  # Không cần và không được override model vanilla của vật phẩm này trong resource pack.
  material: BARRIER
  item-model: haohansmp:soul_anchor
  placed-block: BARRIER
  custom-model-data: 910001
  display-name: "&b&lSoul Anchor"
  lore:
    - "&7A relic that binds a soul path to the world."
    - "&7Place it to create a teleport anchor."
    - ""
    - "&fID: &7haohansmp:soul_anchor"
    - "&fLimit: &b3 Soul Anchors"
    - "&fRequirement: &a10 levels / 1000 blocks"
    - "&fXP charge: &e8 points / required level"
    - "&fPlus: &b1 Echo Shard"

recipe:
  enabled: true
  discover-automatically: true

distance:
  blocks-per-tier: 1000
  levels-per-tier: 10
  minimum-level-cost: 10

teleport:
  echo-shard-cost: 1
  # Applies to every distance tier: required levels are a threshold, and successful teleports charge raw XP points.
  experience-points-per-required-level: 8
  warmup-seconds: 3
  cooldown-seconds: 30
  movement-tolerance: 0.5

cross-dimension:
  enabled: true
  level-cost: 30
  echo-shard-cost: 1

safe-location:
  horizontal-radius: 3
  vertical-radius: 4

worlds:
  mode: blacklist
  list:
    - world_event
    - world_resource

breaking:
  drop-item: true

visuals:
  # Model gốc cao khoảng 1.254 block; scale-y 0.877 đưa chiều cao về khoảng 1.1 block.
  scale-x: 1.0
  scale-y: 0.877
  scale-z: 1.0
  interaction-width: 1.2
  interaction-height: 1.1
  idle-particles: true
  idle-particle-interval-ticks: 20
  particle-view-distance: 24
